<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betr1</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.page{
width:100%;
max-width:420px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,0,0,.25);
}

.top-btns{
display:flex;
gap:10px;
margin-bottom:15px;
}

button,a{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
text-decoration:none;
font-weight:bold;
text-align:center;
}

.copy{
flex:1;
background:#0099ff;
color:white;
}

.download{
flex:1;
background:#28a745;
color:white;
}

.input-box{
margin:12px 0;
background:#ff0000;
padding:3px;
border-radius:14px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#fff;
color:#111;
font-size:16px;
font-weight:bold;
outline:none;
}

.confirm{
width:100%;
background:#ff0000;
color:white;
font-size:16px;
}

#errorBox{
margin-top:10px;
background:#ffcc00;
color:#111;
padding:10px;
border-radius:10px;
font-weight:bold;
display:none;
text-align:center;
}

#page2{
display:none;
}

.online{
background:#222;
padding:12px;
border-radius:12px;
font-size:18px;
color:#00ff66;
text-align:center;
font-weight:bold;
}

.show-id{
margin-top:8px;
background:#111;
padding:10px;
border-radius:10px;
border:1px solid #333;
text-align:center;
font-weight:bold;
color:#fff;
}

#timerBox{
margin-top:10px;
background:#ffcc00;
color:#111;
padding:10px;
border-radius:10px;
font-weight:bold;
text-align:center;
}

.predict-box{
height:220px;
background:#fff;
border:4px solid #ff0000;
border-radius:15px;
margin:15px 0;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
font-weight:bold;
color:#ff0000;
padding:15px;
text-align:center;
line-height:1.6;
}

.change{
flex:1;
background:#0099ff;
color:white;
font-size:16px;
}

#toast{
position:fixed;
bottom:-100px;
left:50%;
transform:translateX(-50%);
background:#00c853;
color:white;
padding:12px 25px;
border-radius:10px;
font-weight:bold;
transition:.4s;
z-index:9999;
}

#toast.show{
bottom:20px;
}

</style>
</head><body>

<div class="page">

<!-- الصفحة 1 -->

<div id="page1" class="card">

<div class="top-btns">

<button class="copy" onclick="copyCode()">
Betr1
</button>

<a class="download"
href="https://eg-1xbet.com/ar"
target="_blank">
تحميل المنصة
</a>

</div>

<div class="input-box">
<input type="number" id="id" placeholder="ID">
</div>

<div class="input-box">
<input type="password" id="pass" placeholder="Password">
</div>

<button class="confirm" onclick="login()">
تأكيد
</button>

<div id="errorBox"></div>

</div>

<!-- الصفحة 2 -->

<div id="page2" class="card">

<div class="online">

🟢 أشخاص أونلاين:
<span id="online">127</span>

<div class="show-id">
ID:
<span id="showIdTop"></span>
</div>

<div id="timerBox">
⏳ الوقت المتبقي: 20:00
</div>

</div>

<div class="predict-box">
<span id="showBox"></span>
</div>

<div style="display:flex;gap:10px;">

<button class="change" onclick="showPrediction()">
تغيير التوقع
</button>

<button class="change">
ريستارت
</button>

</div>

</div>

</div>

<div id="toast">
✅ تم نسخ البروموكود
</div>

<script>

let count = 127;
let savedId = "";

function copyCode(){

navigator.clipboard.writeText("Betr1");

let toast = document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}function login(){

let id = document.getElementById("id").value;
let pass = document.getElementById("pass").value;

let errorBox = document.getElementById("errorBox");

errorBox.style.display = "none";

if(id === "" || pass === ""){
errorBox.style.display = "block";
errorBox.innerText = "⚠️ يرجى إدخال البيانات";
return;
}

// منع ID محدد
if(id === "1122774328"){
errorBox.style.display = "block";
errorBox.innerText = "⚠️ هذا ID متفعل عند حساب آخر";
return;
}

// فحص مدة الانتظار
let waitUntil = localStorage.getItem("waitUntil");

if(waitUntil && Date.now() < Number(waitUntil)){

let mins = Math.ceil(
(Number(waitUntil) - Date.now()) / 60000
);

errorBox.style.display = "block";
errorBox.innerText =
"⏳ انتظار " + mins + " دقيقة لتشغيل مرة أخرى";

return;
}

if(pass === "Betr1"){

savedId = id;

document.getElementById("showIdTop").innerText = id;

document.getElementById("page1").style.display = "none";
document.getElementById("page2").style.display = "block";

// عداد 20 دقيقة
let timeLeft = 20 * 60;

let timer = setInterval(()=>{

let minutes = Math.floor(timeLeft / 60);
let seconds = timeLeft % 60;

document.getElementById("timerBox").innerText =
"⏳ الوقت المتبقي: " +
String(minutes).padStart(2,"0") +
":" +
String(seconds).padStart(2,"0");

timeLeft--;

if(timeLeft < 0){

clearInterval(timer);localStorage.setItem(
"waitUntil",
Date.now() + (5 * 60 * 1000)
);

document.getElementById("page2").style.display = "none";
document.getElementById("page1").style.display = "block";

errorBox.style.display = "block";
errorBox.innerText =
"⏳ انتهت الجلسة، انتظر 5 دقائق لتشغيل مرة أخرى";

}

},1000);

}else{

errorBox.style.display = "block";
errorBox.innerText = "⚠️ الباسورد غير صحيح";

}

}

// عداد الأونلاين
setInterval(()=>{

count += Math.floor(Math.random()*7)-3;

if(count < 50){
count = 50;
}

document.getElementById("online").innerText = count;

},2000);

// عرض الرسالة داخل المربع
function showPrediction(){

document.getElementById("showBox").innerHTML =
"⚠️ هناك خطأ في السيرفر او غير متصل<br><br>" +
"البروموكود: Betr1<br><br>" +
"برجاء اضع هذا الرمز داخل التطبيق ثم اودع 500ج او 10$ ليتم التفعيل السيرفر";

}

</script>

</body>
</html>
